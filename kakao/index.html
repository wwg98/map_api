<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>지도 생성하기</title>
    <style>
      .map {
        height: 350px;
        border: 1px solid #ccc;
      }
      .infoWindow {
        border: 1px solid #ccc;
        padding: 20px 40px;
        box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.15);
      }
      .wrapper {
        display: grid;
        grid-template-columns: 1fr 2fr;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <ul class="location">
        <li data-lat="37.5175066" data-lng="127.0473753">강남구청</li>
        <li data-lat="37.5323264" data-lng="126.9907031">용산구청</li>
        <li data-lat="37.6540782" data-lng="127.0566045">노원구청</li>
      </ul>
      <!-- 지도를 표시할 div 입니다 -->
      <div id="map" class="map"></div>
    </div>

    <script
      type="text/javascript"
      src="//dapi.kakao.com/v2/maps/sdk.js?appkey=4a1418376ab9dc66d7de3f076bf0a3d7"></script>
    <script>
      function myMap(lat, lng, title) {
        var mapContainer = document.getElementById("map"), // 지도를 표시할 div
          mapOption = {
            center: new kakao.maps.LatLng(lat, lng), // 지도의 중심좌표
            level: 5, // 지도의 확대 레벨
          };

        // 지도를 표시할 div와  지도 옵션으로  지도를 생성합니다
        var map = new kakao.maps.Map(mapContainer, mapOption);

        var iwContent = `
        <div class="infoWindow">
          <h2>${title}</h2>
        </div>`,
          // 인포윈도우에 표출될 내용으로 HTML 문자열이나 document element가 가능합니다
          iwPosition = new kakao.maps.LatLng(lat, lng), //인포윈도우 표시 위치입니다
          iwRemoveable = true; // removeable 속성을 ture 로 설정하면 인포윈도우를 닫을 수 있는 x버튼이 표시됩니다

        // 인포윈도우를 생성하고 지도에 표시합니다
        var infowindow = new kakao.maps.InfoWindow({
          map: map, // 인포윈도우가 표시될 지도
          position: iwPosition,
          content: iwContent,
          removable: iwRemoveable,
        });
      }

      myMap(37.5175066, 127.0473753, "강남구청");

      const locations = document.querySelectorAll(".location li");

      locations.forEach(location => {
        location.addEventListener("click", () => {
          // let lat = location.getAttribute('data-lat');
          let lat = location.dataset.lat;
          let lng = location.dataset.lng;
          let title = location.innerText;
          myMap(lat, lng, title);
        });
      });
    </script>
  </body>
</html>
